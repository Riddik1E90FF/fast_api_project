services:
  backend:
    build: ./backend
    ports: 
      - "8000:8000"
    depends_on:
      - db
    networks:
      - app-network
    environment:
      - MONGO_URL=mongodb://db:27017
  db:
    container_name: db
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - app-network
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - api

networks:
  app-network:
    driver: bridge

